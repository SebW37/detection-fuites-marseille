<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test CSP Simple - Tailwind CSS</title>
    
    <!-- Test Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Test Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-center text-blue-600 mb-8">
            <i class="fas fa-check-circle text-green-500 mr-3"></i>
            Test CSP Simple - Tailwind CSS
        </h1>
        
        <div class="bg-white p-6 rounded-lg shadow-lg mb-6">
            <h2 class="text-2xl font-semibold text-green-700 mb-4">
                <i class="fas fa-css3-alt mr-2"></i>
                Test Tailwind CSS
            </h2>
            <p class="text-gray-700 mb-4">Si vous voyez ce texte stylé avec des couleurs et une mise en page, Tailwind CSS fonctionne !</p>
            <div class="bg-blue-500 text-white p-4 rounded-lg">
                <p class="font-semibold">🎉 Tailwind CSS est chargé avec succès !</p>
            </div>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow-lg mb-6">
            <h2 class="text-2xl font-semibold text-green-700 mb-4">
                <i class="fas fa-icons mr-2"></i>
                Test Font Awesome
            </h2>
            <p class="text-gray-700 mb-4">Icônes Font Awesome :</p>
            <div class="flex gap-4 text-3xl">
                <i class="fas fa-home text-blue-500"></i>
                <i class="fas fa-user text-green-500"></i>
                <i class="fas fa-cog text-purple-500"></i>
                <i class="fas fa-star text-yellow-500"></i>
                <i class="fas fa-heart text-red-500"></i>
            </div>
        </div>
        
        <div class="text-center">
            <a href="index.html" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>
                Retour à l'accueil
            </a>
        </div>
    </div>
    
    <script>
        console.log('✅ Page de test CSP simple chargée');
        
        if (window.tailwind) {
            console.log('✅ Tailwind CSS est disponible');
        } else {
            console.log('❌ Tailwind CSS n\'est pas disponible');
        }
        
        if (document.querySelector('.fas')) {
            console.log('✅ Font Awesome est chargé');
        } else {
            console.log('❌ Font Awesome n\'est pas chargé');
        }
    </script>
</body>
</html>
